version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: 0000  # No quotes
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: fast_api   # No quotes
    ports:
      - "3366:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      # Added credentials to healthcheck so it doesn't fail
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p0000"]
      interval: 5s
      retries: 5

  fastapi_app:
    build: .
    container_name: fastapi_app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
       - MYSQL_HOST=db
       - MYSQL_PORT=3306
       - MYSQL_USER=root
       - MYSQL_PASSWORD=0000     # No quotes here
       - MYSQL_DATABASE=fast_api
volumes:
  mysql_data:
